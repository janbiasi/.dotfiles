personality = "pragmatic"
approval_policy = "on-request"
web_search = "cached"
model = "gpt-5.5"
model_reasoning_effort = "medium"

[analytics]
enabled = false

[shell_environment_policy]
include_only = ["PATH", "HOME", "SHELL", "LC_ALL", "EDITOR", "DIRENV_DIR", "DIRENV_FILE"]

[features]
hooks = true
memories = false
js_repl = false

[tui]
status_line = ["model-with-reasoning", "current-dir", "context-used", "five-hour-limit", "weekly-limit"]
status_line_use_colors = true

[desktop]
keepRemoteControlAwakeWhilePluggedIn = true
git-show-sidebar-pr-icons = true

[desktop.open-in-target-preferences]
global = "zed"

# Plugins

[plugins."chrome@openai-bundled"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

# MCP Servers

[mcp_servers.plane]
enabled = false
url = "https://mcp.plane.so/http/mcp"

[mcp_servers.github]
enabled = false
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GITHUB_TOKEN"

[mcp_servers.serena]
enabled = false
command = "uvx"
args = [
  "--from",
  "git+https://github.com/oraios/serena",
  "serena",
  "start-mcp-server",
  "--context",
  "agent",
]

[mcp_servers.context7]
enabled = true
url = "https://mcp.context7.com/mcp"
env_http_headers = { "CONTEXT7_API_KEY" = "CONTEXT7_API_KEY" }

[mcp_servers.chrome]
enabled = true
command = "bun"
args = ["x", "chrome-devtools-mcp@latest"]

[mcp_servers.chrome.tools.navigate_page]
approval_mode = "approve"

[mcp_servers.chrome.tools.take_snapshot]
approval_mode = "approve"

[mcp_servers.chrome.tools.evaluate_script]
approval_mode = "approve"

[mcp_servers.chrome.tools.get_network_request]
approval_mode = "approve"

[mcp_servers.chrome.tools.take_screenshot]
approval_mode = "approve"

[mcp_servers.chrome.tools.new_page]
approval_mode = "approve"

[mcp_servers.posthog]
enabled = false
command = "bun"
args = [
  "x",
  "mcp-remote@latest",
  "https://mcp-eu.posthog.com/mcp",
]
