"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

# Put time on the right side
# https://starship.rs/config/#prompt
# right_format = '''$time$battery'''

# Starship modules

[character]
success_symbol = "[вқҜ](green)"
error_symbol = "[вқҜ](red)"
vimcmd_symbol = "[вқ®](gray)"   # For use with zsh-vi-mode

[username]
disabled = true

[sudo]
disabled = false
style = "bold red"
symbol = "у°ўҸ root"
format = "[$symbol]($style)"

[directory]
truncation_length = 4
style = "yellow"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"node_modules" = "о—ә"
".github" = "оҷӣ"

[battery]
disabled = true

[[battery.display]]
threshold = 10
style = 'red'

[[battery.display]]
threshold = 30
style = 'yellow'

[time]
disabled = true
time_format = "%R"                         # Hour:Minute Format
style = "fg:yellow"
format = '[[ пҗә  $time ](fg:gray)]($style)'

[package]
disabled = true

# Languages and indicator styles

[git_branch]
format = "[$branch]($style) "
style = "purple"

[git_status]
style = "purple"
conflicted = "вҖӢ"
untracked = "вҖӢ"
modified = "вҖӢ"
staged = "вҖӢ"
renamed = "вҖӢ"
deleted = "вҖӢ"
stashed = "вүЎ"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "purple"

[docker_context]
disabled = true

[java]
symbol = "у°…¶ "
version_format = "${major}"
style = "red"

[nodejs]
symbol = "оңҳ "
version_format = "${major}"
style = "green"

[golang]
symbol = "оҳ§ "
version_format = "${major}.${minor}"
style = "blue"

[elixir]
symbol = "оҳӯ "
version_format = "${major}.${minor}"
style = "violet"

[erlang]
symbol = "оһұ  "
version_format = "${major}"
style = "pink"

[gradle]
symbol = "оҷ  "
version_format = "${major}"
style = "blue"

[kotlin]
symbol = "оҳҙ "
version_format = "${major}"
style = "violet"

[scala]
symbol = "оң· "
style = "orange"

[rust]
symbol = "оҡӢ "
style = "red"

[bun]
symbol = "оқҜ "
style = "pink"

[nix_shell]
impure_msg = 'impure'
pure_msg = 'pure'
unknown_msg = 'unknown'
format = 'in [уұ„… nix](cyan)'

[cmd_duration]
min_time = 3500
format = "[ у°…җ $duration]($style)"
style = "yellow"
